# Full virtie manifest example using the supported snake_case schema.

host_name = "virtie"
working_dir = "."
state_dir = ".virtie"

[host]
system = "x86_64-linux"
netcat = "nc"

[qemu]
exec = ["qemu-system-x86_64"]
user = ""
seccomp = false
machine_options = { accel = "kvm:tcg", pcie = "on" }
qmp_socket = "qmp.sock"
guest_agent_socket = "qga.sock"

[machine]
type = "microvm"
id = "virtie"
memory = 1024
vcpu = 2
cpu = "host,+x2apic,-sgx"
kvm = true

[kernel]
path = "/tmp/vmlinuz"
initrd_path = "/tmp/initrd"
params = []
serial_console = false

[graphics]
backend = "headless"

[ssh]
user = "agent"
exec = [
  "ssh",
  "-q",
  "-o",
  "StrictHostKeyChecking=no",
  "-o",
  "UserKnownHostsFile=/dev/null",
  "-o",
  "GlobalKnownHostsFile=/dev/null",
]
ready_socket = "ssh-ready.sock"
retry_delay_ms = 1000

[vsock]
cid_range = { min = 3, max = 65535 }

[[volumes]]
image = ".virtie/root.img"
size = 4096
fs = "ext4"
create = true
read_only = false
label = "root"
direct = false
serial = "root"

[[mounts]]
type = "virtiofs"
tag = "workspace"
source = "."
read_only = false
virtiofsd_socket = "workspace.sock"
virtiofsd_exec = ["/usr/libexec/virtiofsd"]
security_model = "mapped"
cache = "auto"

[[networks]]
id = "microvm1"
type = "user"
mac = "02:02:00:00:00:01"
forward = [
  { proto = "tcp", from = "host", host = "127.0.0.1:2222", guest = "10.0.2.15:22" },
]

[balloon]
enabled = true
deflate_on_oom = false
free_page_reporting = true

[balloon.controller]
min_actual = 512
max_actual = 1024
grow_below_available = 256
reclaim_above_available = 512
step = 256
poll_interval_seconds = 5
reclaim_holdoff_seconds = 30

[[write_files]]
guest_path = "/etc/example.conf"
chown = "agent:users"
text = "example"
mode = "0644"
overwrite = false

[[write_files]]
guest_path = "/var/lib/virtie/host"
source = "host-file"
overwrite = true

[notifications]
exec = ["/bin/sh", "-c", "printf '%s\n' \"$VIRTIE_NOTIFY_STATE\""]
states = []

# Proposed simplified virtie manifest.
# This annotated manifest documents the supported snake_case schema.

# This names the guest and is also used to derive default lock/state names.
# It must be configurable because multiple manifests may run from the same host
# account, and a stable name makes logs and persisted state attributable.
host_name = "virtie"  # Default: "virtie"

# Relative host paths need a stable root. Keeping this explicit lets generated
# manifests point at the repository checkout while hand-written manifests can
# opt into another base directory without changing every path below.
# During launch, virtie resolves a relative working_dir from the directory
# where virtie was run and persists the absolute path back into the manifest.
working_dir = "."  # Default: "." (launch CWD)

# virtie needs one host-side directory for files it owns: lock files, active
# PID files, saved suspend state, and derived runtime sockets. Put volume images
# under this directory too when they should move with the VM's local state.
state_dir = ".virtie"  # Default: ".virtie"

[qemu]
# virtie launches QEMU directly instead of relying on a wrapper. The executable
# must be configurable so Nix-generated manifests can pin an exact package while
# hand-written manifests can use a PATH-resolved binary. Extra arguments are an
# escape hatch for QEMU features virtie does not model yet; they are appended
# after generated arguments and can affect launch behavior.
exec = ["qemu-system-x86_64"]  # Default: qemu-system-$host_arch

# Guest-to-host port forwarding uses QEMU guestfwd cmd: rules. This command
# opens the host-side connection for each forward where from = "guest"; virtie
# expands $HOST and $PORT from the forward's host endpoint. Netcat and socat
# examples:
#   fwd_tunnel_exec = ["nc", "$HOST", "$PORT"]
#   fwd_tunnel_exec = ["socat", "-", "TCP:$HOST:$PORT"]
fwd_tunnel_exec = ["nc", "$HOST", "$PORT"]  # Default: ["nc", "$HOST", "$PORT"]

# QEMU can drop privileges to another host user before running the VM. This is
# useful for generated manifests that know the host account policy; leaving it
# empty keeps the current process user.
user = ""  # Default: do not pass QEMU -user

# QEMU seccomp blocks some host syscalls from the VM process. It improves
# isolation when the packaged QEMU supports it, but enabling it against a QEMU
# build or host setup that lacks support can prevent the VM from launching.
seccomp = false  # Default: Disabled unless generated from known QEMU support

# QEMU machine options are exposed because some board details, such as
# acceleration preference or PCIe availability, must line up with host
# capability and device choices. Omit this to let virtie derive conservative
# defaults for the selected backend.
machine_options = { accel = "kvm:tcg", pcie = "on" }  # Default: Derived for host/backend/devices

# QEMU monitor and virtio-serial sockets are normally derived under state_dir.
# Explicit names are useful for wrappers, tests, and integrations that need
# stable socket paths. Paths are relative to state_dir.
qmp_socket = "qmp.sock"  # Default: "qmp.sock"
guest_agent_socket = "qga.sock"  # Default: "qga.sock"

[machine]
# The machine profile is the backend-neutral VM shape virtie should run. For
# QEMU today this maps to a board model; another backend may map it to its own
# closest machine class. Changing it can affect boot compatibility and devices.
type = "microvm"  # Options: microvm (default: microvm)

# A stable machine id lets generated configurations preserve VM identity across
# launches. Omit it when the backend should use its own default identity.
id = "virtie"  # Default: no explicit machine id

# Memory sizing affects backend allocation, guest capacity, and balloon controller
# bounds. It is required in non-trivial manifests because too small a value can
# fail boot or package builds, while too large a value can starve the host.
memory = 1024  # Default: 1024 MiB

# vCPU count is optional because host defaults are often acceptable. Set it
# when reproducibility or multi-queue network behavior matters.
vcpu = 2  # Default: All available cores

# The CPU model determines which guest CPU features are exposed. Host-passthrough
# is fast and capable but less portable; a generic model is more reproducible.
cpu = "host,+x2apic,-sgx"  # Default: Host-specific best fit

# KVM acceleration is the normal Linux fast path. Disabling it falls back to
# emulation for hosts without /dev/kvm or for debugging, at a major performance
# cost.
kvm = true  # Default: Enabled on Linux when supported

[kernel]
# virtie cannot infer the guest kernel/initrd: these are build artifacts from
# the surrounding system. They must be explicit so launch is decoupled from Nix
# evaluation and can also work with hand-written manifests.
path = "/tmp/vmlinuz"
initrd_path = "/tmp/initrd"

# Kernel params are the guest boot contract. This remains configurable for
# debugging, console policy, and guest feature flags, but empty should be enough
# for the standard generated sandbox.
params = []  # Default: virtie adds required runtime params only

# Serial console support changes both QEMU wiring and kernel console params.
# It is useful for debugging boot failures, but noisy for normal sandbox use.
serial_console = false  # Default: no serial console params

[graphics]
# Graphics switches QEMU out of headless mode and selects the host display
# backend. Omit this section for the normal terminal/SSH workflow.
backend = "headless"  # Options: headless, gtk, cocoa (default: headless)

[ssh]
# virtie connects through SSH after the guest signals readiness. The user is
# part of the guest image contract, so it must match the account provisioned
# inside the VM.
user = "agent"  # Default: "agent"

# The SSH executable and fixed arguments are configurable. Default: [] (no
# automatic SSH attach or command hint). Generated manifests can pin OpenSSH and
# identity options.
exec = [
  "ssh",
  "-q",
  "-o", "StrictHostKeyChecking=no",
  "-o", "UserKnownHostsFile=/dev/null",
  "-o", "GlobalKnownHostsFile=/dev/null",
]

ready_socket = "ssh-ready.sock"  # Default: "" (disabled)

# When ready_socket is set, virtie waits for ssh to start via signaling socket
# (ssh-ready.sock). When exec is non-empty and SSH attach is requested, virtie
# retries the host-side SSH command at this interval until it starts or fails
# with a non-transient error.
retry_delay = 0.5  # Default: 0.5 seconds

# When enabled, virtie can recover from public-key authentication failure by
# generating a state-dir key, appending its public key to authorized_keys through
# the guest agent, and retrying SSH with that identity.
autoprovision = true  # Default: false

[vsock]
# virtie allocates a runtime vsock CID to avoid collisions between concurrent
# VMs. The range exists for hosts or orchestrators that reserve parts of the
# CID space; narrowing it too much can make launch fail under concurrency.
cid_range = { min = 3, max = 65535 }  # Default: Full allocatable CID range

[[volumes]]
# Volumes attach host disk images to the guest. The image path is necessary
# because virtie creates and validates the host file before QEMU starts.
image = ".virtie/root.img"

# Auto-creation lets a manifest describe persistent storage without a separate
# provisioning step. The size and filesystem matter because virtie can only
# create supported filesystems, and changing them after creation does not
# rewrite an existing image.
size = 4096  # Default: Minimum auto-created image size
fs = "ext4"  # Options: ext4 (default: ext4)
create = true  # Default: Use existing image only
read_only = false  # Default: attach writable
label = "root"  # Default: no filesystem label
direct = false  # Default: backend cache policy

[[mounts]]
# Mounts are shared host directories. virtiofs is the default because it is the
# normal agentspace path; an explicit tag is still required because the guest
# uses it to identify what to mount.
type = "virtiofs"  # Options: virtiofs, 9p (default: virtiofs)
tag = "workspace"
source = "."
read_only = false  # Default: guest can write to the share

# QEMU talks to virtiofsd through this socket. Keeping the socket named in the
# manifest lets virtie wait for readiness and place it under state_dir.
virtiofsd_socket = "workspace.sock"

# The daemon command is needed when virtie owns the host-side virtiofsd
# lifecycle. Omit it for externally managed sockets; setting it means virtie
# will start and stop the daemon with the VM. virtie injects the resolved socket
# path into the daemon environment as VIRTIOFSD_SOCKET.
virtiofsd_exec = ["virtiofsd"]

# Filesystem security and cache policy are backend-specific share behavior. The
# defaults match the normal workspace share, while 9p and read-only store shares
# may need different values.
security_model = "mapped"  # Options: mapped, none, passthrough (default: mapped)
cache = "auto"  # Options: auto, always, none (default: auto)


[[networks]]
# Network devices default to QEMU user networking, but the manifest needs a
# place to describe non-default device identity and port forwarding. The id and
# MAC are stable handles for QEMU and the guest.
id = "microvm1"
type = "user"  # Options: user (default: user)
mac = "02:02:00:00:00:01"

# Port forwards are host/guest integration points. They are explicit because
# they expose host listeners or guest callbacks and can conflict with ports
# already in use.
forward = [
  { proto = "tcp", from = "host", host = "127.0.0.1:2222", guest = "10.0.2.15:22" }, # proto options: tcp, udp (default: tcp); from options: host, guest (default: host)
]

[balloon]
# The balloon device lets virtie reclaim or grow guest memory at runtime. It is
# optional because it adds a QEMU device and depends on guest driver support.
enabled = false  # Default: false

# deflateOnOOM lets the guest reclaim ballooned memory during pressure. It can
# improve survivability under OOM but weakens the host's control over memory
# reclamation.
deflate_on_oom = false  # Default: Host keeps control of balloon target

# Free page reporting gives the host better information about reclaimable guest
# memory. It is useful for dynamic memory management when supported by QEMU and
# the guest kernel.
free_page_reporting = true  # Default: Enabled when balloon is enabled

[balloon.controller]
# Controller thresholds define when virtie changes the balloon target. These
# are policy knobs rather than launch requirements; bad thresholds can cause
# memory churn or leave the guest under-provisioned.
min_actual = 512  # MiB
max_actual = 1024  # MiB
grow_below_available = 256  # MiB
reclaim_above_available = 512  # MiB
step = 256  # MiB
poll_interval_seconds = 5
reclaim_holdoff_seconds = 30

[[write_files]]
# Guest file writes depend on the QEMU guest agent. They belong in the manifest
# because they are part of first-boot guest configuration rather than the host
# launch command.
guest_path = "/etc/example.conf"
chown = "agent:users"  # Default: preserve guest agent write ownership

# Inline text is convenient for small config files. Use a host source file for
# binary or larger payloads so TOML encoding does not become the transport.
text = "example"

# Mode and overwrite are explicit because accidental permissions or replacing
# an existing guest file can be security-sensitive and hard to diagnose later.
mode = "0644"
overwrite = false  # Default: Preserve existing guest files

[[write_files]]
# Host-file sources are the alternative to inline text for binary or larger
# payloads. A write_files entry must choose exactly one of text or source.
guest_path = "/var/lib/virtie/host"
source = "host-file"
overwrite = true

[notifications]
# Notifications are host-side hooks for surfacing runtime state changes. The
# command is optional because hooks can run arbitrary host code; when set, its
# exit status should not become VM lifecycle policy.
exec = ["/bin/sh", "-c", "printf '%s\n' \"$VIRTIE_NOTIFY_STATE\""]

# Empty means all supported states. A non-empty list limits hook execution,
# which is useful when only noisy states such as balloon changes should notify.
states = []  # Default: Notify on all states
